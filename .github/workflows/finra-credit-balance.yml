name: FINRA 현금여력 배지 갱신

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 13 19-25 * *'          # FINRA 발표 주기(매월 3주차)에 맞춰 매일 시도

permissions:
  contents: write

concurrency:
  group: finra-credit-balance
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet pandas openpyxl curl_cffi beautifulsoup4 lxml

      - name: Build badge
        run: python scripts/finra_credit_balance.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/finra_credit_balance.json data/finra_history.csv
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: FINRA 현금여력 배지 갱신 ($(date -u +%F))"
            git push
          fi
