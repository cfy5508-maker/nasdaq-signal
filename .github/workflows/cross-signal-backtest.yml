name: Cross Signal Backtest

on:
  workflow_dispatch:
    inputs:
      forward_days:
        description: "몇일 뒤를 볼지"
        required: false
        default: "5"
      short_ma:
        description: "단기 이평선 기간"
        required: false
        default: "20"
      long_ma:
        description: "장기 이평선 기간"
        required: false
        default: "60"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance numpy

      - name: Run backtest
        run: python cross_signal_backtest.py "${{ github.event.inputs.forward_days }}" "${{ github.event.inputs.short_ma }}" "${{ github.event.inputs.long_ma }}"
