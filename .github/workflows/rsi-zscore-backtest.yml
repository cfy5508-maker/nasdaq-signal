name: RSI Zscore Backtest

on:
  workflow_dispatch:
    inputs:
      forward_days:
        description: "신호 후 며칠 뒤 수익률을 볼지"
        required: false
        default: "10"
      group:
        description: "large 또는 small"
        required: false
        default: "large"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance pandas numpy ta

      - name: Run backtest
        run: python rsi_zscore_backtest.py "${{ github.event.inputs.forward_days }}" "${{ github.event.inputs.group }}"
