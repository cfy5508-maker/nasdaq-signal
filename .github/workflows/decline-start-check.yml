name: Decline Start Check

on:
  workflow_dispatch:
    inputs:
      forward_days:
        description: "몇일 뒤를 볼지"
        required: false
        default: "5"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance numpy

      - name: Run check
        run: python decline_start_check.py "${{ github.event.inputs.forward_days }}"
