name: Update Nasdaq Data

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 평일 UTC 21:30 = 미국 동부 오후 4:30 (장 마감 후 30분)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update nasdaq_data.js
        env:
          AV_KEY: ${{ secrets.AV_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, os, datetime, time

          AV_KEY = os.environ['AV_KEY']
          FRED_KEY = os.environ['FRED_KEY']
          RATIO = 25709 / 716.07
          DAILY_KEEP = 7

          # ── 나스닥 일일 데이터 (QQQ Daily) ──────────
          print("나스닥 일일 데이터 가져오는 중...")
          url_nd = f"https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=QQQ&outputsize=compact&apikey={AV_KEY}"
          req = urllib.request.Request(url_nd, headers={'User-Agent':'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=15) as r:
              d = json.loads(r.read())
          ts = d.get('Time Series (Daily)', {})
          dates = sorted(ts.keys(), reverse=True)[:DAILY_KEEP]
          dates = sorted(dates)
          nd_daily_new = [round(float(ts[d2]['4. close']) * RATIO, 2) for d2 in dates]
          labels_daily_new = [d2[2:4]+'.'+d2[5:7]+'.'+d2[8:10] for d2 in dates]
          print(f"  최신: {labels_daily_new[-1]} = {nd_daily_new[-1]}")

          time.sleep(2)

          # ── HY OAS 일일 데이터 (FRED) ────────────────
          print("HY OAS 일일 데이터 가져오는 중...")
          end_date = datetime.date.today().strftime('%Y-%m-%d')
          start_date = (datetime.date.today() - datetime.timedelta(days=14)).strftime('%Y-%m-%d')
          url_hy = f"https://api.stlouisfed.org/fred/series/observations?series_id=BAMLH0A0HYM2&api_key={FRED_KEY}&observation_start={start_date}&observation_end={end_date}&file_type=json"
          req2 = urllib.request.Request(url_hy, headers={'User-Agent':'Mozilla/5.0'})
          with urllib.request.urlopen(req2, timeout=15) as r2:
              d2 = json.loads(r2.read())
          obs = [o for o in d2['observations'] if o['value'] != '.']
          obs = obs[-DAILY_KEEP:]
          hy_daily_new = [float(o['value']) for o in obs]
          hy_dates = [o['date'] for o in obs]
          hy_map = {o['date']: float(o['value']) for o in obs}
          hy_daily_aligned = []
          last_hy = hy_daily_new[-1] if hy_daily_new else 2.75
          for d3 in dates:
              if d3 in hy_map:
                  last_hy = hy_map[d3]
              hy_daily_aligned.append(last_hy)
          print(f"  최신: {hy_dates[-1]} = {hy_daily_new[-1]}%")

          # ── data.js 업데이트 ──────────────────────────
          today = datetime.date.today().strftime('%Y-%m-%d')
          with open('nasdaq_data.js', 'r') as f:
              js = f.read()

          js = re.sub(r'최신화: .*?\n', f'최신화: {labels_daily_new[-1]} ({today})\n', js)
          nd_str = ','.join(str(v) for v in nd_daily_new)
          hy_str = ','.join(str(v) for v in hy_daily_aligned)
          lbl_str = "','".join(labels_daily_new)
          js = re.sub(r'var nd_daily=\[.*?\];', f'var nd_daily=[{nd_str}];', js, flags=re.DOTALL)
          js = re.sub(r'var hy_daily=\[.*?\];', f'var hy_daily=[{hy_str}];', js, flags=re.DOTALL)
          js = re.sub(r'var labels_daily=\[.*?\];', f"var labels_daily=['{lbl_str}'];", js, flags=re.DOTALL)
          js = re.sub(r'var W52_HIGH=.*?;', f'var W52_HIGH={max(nd_daily_new + [27190.21]):.2f};', js)

          with open('/tmp/nasdaq_data.js', 'w') as f:
              f.write(js)
          print("nasdaq_data.js 업데이트 완료")

          # ── chart.html에 data.js 인라인 삽입 ──────────
          with open('nasdaq_chart.html', 'r') as f:
              html = f.read()
          new_block = '<script>\n' + js + '\n</script>'
          start = html.find('<script>\n// ===')
          end = html.find('</script>', start) + len('</script>')
          if start >= 0 and end > start:
              result = html[:start] + new_block + html[end:]
              print("chart.html 업데이트 완료")
          else:
              result = html
              print("경고: chart.html script 블록 못찾음")
          with open('/tmp/nasdaq_chart.html', 'w') as f:
              f.write(result)
          print(f"일일 데이터: {labels_daily_new}")
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 원격 최신 상태로 완전 동기화 (로컬 변경사항 없음)
          git fetch origin main
          git reset --hard origin/main
          # /tmp에서 수정된 파일 복사
          cp /tmp/nasdaq_data.js nasdaq_data.js
          cp /tmp/nasdaq_chart.html nasdaq_chart.html
          # 커밋 & 푸시
          git add nasdaq_data.js nasdaq_chart.html
          git diff --staged --quiet || git commit -m "Auto update: $(date +'%Y-%m-%d')"
          git push origin main --force
