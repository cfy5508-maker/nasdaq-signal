name: Update Nasdaq Data

on:
  schedule:
    # 매일 21:35 UTC(=06:35 KST)에 깨운 뒤, 아래 guard에서 분기
    #   · 나스닥: UTC 평일(월~금)만
    #   · 글로벌지수: KST 1·15·말일만
    - cron: '35 21 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decide what to run
        id: guard
        run: |
          DOW=$(date -u +%u)                              # 1=월 … 7=일 (UTC)
          KDAY=$(TZ=Asia/Seoul date +%-d)                 # KST 일자
          KTOM=$(TZ=Asia/Seoul date -d "tomorrow" +%-d)   # 내일이 1일이면 오늘이 말일
          MANUAL="${{ github.event_name == 'workflow_dispatch' }}"

          RUN_ND=false
          if [ "$DOW" -ge 1 ] && [ "$DOW" -le 5 ]; then RUN_ND=true; fi

          RUN_GL=true

          if [ "$MANUAL" = "true" ]; then RUN_ND=true; RUN_GL=true; fi

          echo "나스닥=$RUN_ND, 글로벌=$RUN_GL (UTC dow=$DOW, KST day=$KDAY)"
          echo "run_nd=$RUN_ND" >> "$GITHUB_OUTPUT"
          echo "run_gl=$RUN_GL" >> "$GITHUB_OUTPUT"

      - name: Setup Python (글로벌 지수용)
        if: steps.guard.outputs.run_gl == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (글로벌 지수용)
        if: steps.guard.outputs.run_gl == 'true'
        run: pip install yfinance pandas

      # ───────────────────────── 나스닥 (기존 그대로) ─────────────────────────
      - name: Update nasdaq_data.js
        if: steps.guard.outputs.run_nd == 'true'
        env:
          AV_KEY: ${{ secrets.AV_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, os, datetime, time

          AV_KEY = os.environ['AV_KEY']
          FRED_KEY = os.environ['FRED_KEY']
          RATIO = 25709 / 716.07
          DAILY_KEEP = 7

          # ── 나스닥 일일 데이터 (QQQ Daily) ──────────
          print("나스닥 일일 데이터 가져오는 중...")
          url_nd = f"https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=QQQ&outputsize=compact&apikey={AV_KEY}"
          req = urllib.request.Request(url_nd, headers={'User-Agent':'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=15) as r:
              d = json.loads(r.read())
          ts = d.get('Time Series (Daily)', {})
          dates = sorted(ts.keys(), reverse=True)[:DAILY_KEEP]
          dates = sorted(dates)
          nd_daily_new = [round(float(ts[d2]['4. close']) * RATIO, 2) for d2 in dates]
          labels_daily_new = [d2[2:4]+'.'+d2[5:7]+'.'+d2[8:10] for d2 in dates]
          print(f"  최신: {labels_daily_new[-1]} = {nd_daily_new[-1]}")

          time.sleep(2)

          # ── HY OAS 일일 데이터 (FRED) ────────────────
          print("HY OAS 일일 데이터 가져오는 중...")
          end_date = datetime.date.today().strftime('%Y-%m-%d')
          start_date = (datetime.date.today() - datetime.timedelta(days=14)).strftime('%Y-%m-%d')
          url_hy = f"https://api.stlouisfed.org/fred/series/observations?series_id=BAMLH0A0HYM2&api_key={FRED_KEY}&observation_start={start_date}&observation_end={end_date}&file_type=json"
          req2 = urllib.request.Request(url_hy, headers={'User-Agent':'Mozilla/5.0'})
          with urllib.request.urlopen(req2, timeout=15) as r2:
              d2 = json.loads(r2.read())
          obs = [o for o in d2['observations'] if o['value'] != '.']
          obs = obs[-DAILY_KEEP:]
          hy_daily_new = [float(o['value']) for o in obs]
          hy_dates = [o['date'] for o in obs]
          hy_map = {o['date']: float(o['value']) for o in obs}
          hy_daily_aligned = []
          last_hy = hy_daily_new[-1] if hy_daily_new else 2.75
          for d3 in dates:
              if d3 in hy_map:
                  last_hy = hy_map[d3]
              hy_daily_aligned.append(last_hy)
          print(f"  최신: {hy_dates[-1]} = {hy_daily_new[-1]}%")

          time.sleep(2)

          # ── VIX 최신값 (FRED VIXCLS) ─────────────────
          print("VIX 데이터 가져오는 중...")
          url_vix = f"https://api.stlouisfed.org/fred/series/observations?series_id=VIXCLS&api_key={FRED_KEY}&limit=5&sort_order=desc&file_type=json"
          req_vix = urllib.request.Request(url_vix, headers={'User-Agent':'Mozilla/5.0'})
          try:
              with urllib.request.urlopen(req_vix, timeout=15) as rv:
                  dv = json.loads(rv.read())
              vix_obs = [o for o in dv['observations'] if o['value'] != '.']
              vix_now = float(vix_obs[0]['value'])
              print(f"  VIX: {vix_now} ({vix_obs[0]['date']})")
          except Exception as e:
              vix_now = 20.0
              print(f"  VIX 가져오기 실패, 기본값 사용: {e}")

          # ── data.js 업데이트 ──────────────────────────
          today = datetime.date.today().strftime('%Y-%m-%d')
          with open('nasdaq_data.js', 'r') as f:
              js = f.read()

          js = re.sub(r'최신화: .*?\n', f'최신화: {labels_daily_new[-1]} ({today})\n', js)
          nd_str = ','.join(str(v) for v in nd_daily_new)
          hy_str = ','.join(str(v) for v in hy_daily_aligned)
          lbl_str = "','".join(labels_daily_new)
          js = re.sub(r'var nd_daily=\[.*?\];', f'var nd_daily=[{nd_str}];', js, flags=re.DOTALL)
          js = re.sub(r'var hy_daily=\[.*?\];', f'var hy_daily=[{hy_str}];', js, flags=re.DOTALL)
          js = re.sub(r'var labels_daily=\[.*?\];', f"var labels_daily=['{lbl_str}'];", js, flags=re.DOTALL)
          js = re.sub(r'var W52_HIGH=.*?;', f'var W52_HIGH={max(nd_daily_new + [27190.21]):.2f};', js)
          js = re.sub(r'var vix_recent=.*?;', f'var vix_recent={vix_now};', js)

          with open('/tmp/nasdaq_data.js', 'w') as f:
              f.write(js)
          print("nasdaq_data.js 업데이트 완료")

          # ── chart.html에 data.js 인라인 삽입 ──────────
          with open('nasdaq_chart.html', 'r') as f:
              html = f.read()
          new_block = '<script>\n' + js + '\n</script>'
          start = html.find('<script>\n// ===')
          end = html.find('</script>', start) + len('</script>')
          if start >= 0 and end > start:
              result = html[:start] + new_block + html[end:]
              print("chart.html 업데이트 완료")
          else:
              result = html
              print("경고: chart.html script 블록 못찾음")
          with open('/tmp/nasdaq_chart.html', 'w') as f:
              f.write(result)
          print(f"일일 데이터: {labels_daily_new}")
          PYEOF

      # ───────────────────────── 글로벌 지수 (신규) ─────────────────────────
      - name: Inject global index table into chart
        if: steps.guard.outputs.run_gl == 'true'
        run: |
          python fetch_indices.py
          echo "글로벌 지수 표 주입 완료"

      - name: Capex QoQ
        run: python fetch_capex.py

      - name: HY OAS Nowcast
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: python fetch_hy_oas_nowcast.py
          

      # ───────────────────────── 커밋 & 푸시 (통합) ─────────────────────────
      - name: Commit and Push
        if: steps.guard.outputs.run_nd == 'true' || steps.guard.outputs.run_gl == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # reset 전 data 폴더 전체 백업
          cp -r data /tmp/databak 2>/dev/null || true
          # 원격 최신 상태로 완전 동기화
          git fetch origin main
          git reset --hard origin/main
          # /tmp에서 수정된 파일 복원
          if [ -f /tmp/nasdaq_data.js ]; then cp /tmp/nasdaq_data.js nasdaq_data.js; fi
          if [ -f /tmp/nasdaq_chart.html ]; then cp /tmp/nasdaq_chart.html nasdaq_chart.html; fi
          # data 폴더 파일들 복원 (capex, FINRA 등)
          if [ -d /tmp/databak ]; then mkdir -p data && cp -r /tmp/databak/* data/ 2>/dev/null || true; fi
          git add -A
          git diff --staged --quiet || git commit -m "Auto update: $(date +'%Y-%m-%d')"
          git push origin main
