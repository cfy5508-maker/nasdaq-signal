name: Deadcat Trend Confirm Backtest

on:
  workflow_dispatch:
    inputs:
      forward_days:
        description: "며칠간 저점 유지 여부를 볼지"
        required: false
        default: "10"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance pandas numpy

      - name: Run backtest
        run: python deadcat_trend_confirm_backtest.py "${{ github.event.inputs.forward_days }}"
