name: Score Win Rate Backtest

on:
  workflow_dispatch:
    inputs:
      forward_days:
        description: "신호 후 며칠 뒤 수익률을 볼지"
        required: false
        default: "10"
      lookback_days:
        description: "최근 며칠치를 재구성할지"
        required: false
        default: "150"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance pandas numpy ta

      - name: Run backtest
        run: python score_win_rate_backtest.py "${{ github.event.inputs.forward_days }}" "${{ github.event.inputs.lookback_days }}"
