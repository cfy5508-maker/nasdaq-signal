name: Backfill Yesterday Score

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance pandas numpy ta

      - name: Run backfill
        run: python backfill_yesterday.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/score_history.jsonl
          git diff --staged --quiet || git commit -m "Backfill yesterday score for signal baseline"
          for i in 1 2 3 4 5; do
            git stash -u
            git pull --rebase origin main
            git stash pop || true
            git add -A data/score_history.jsonl
            git diff --staged --quiet || git commit -m "sync after rebase" --allow-empty
            git push && break
            echo "push 실패, 재시도 ($i/5)..."
            sleep 5
          done
